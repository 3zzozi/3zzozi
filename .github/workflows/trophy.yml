name: Generate GitHub Trophy

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: "username=3zzozi&theme=discord&no-bg=true&no-frame=true&column=7&margin-w=8&margin-h=8"
          path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg
          git commit -m "Update GitHub trophy" || exit 0
          git push
